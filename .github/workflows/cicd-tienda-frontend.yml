name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t frontend ./frontend

      - name: Tag Docker Image
        run: |
          docker tag frontend:latest 536342473074.dkr.ecr.us-east-1.amazonaws.com/frontend:latest

      - name: Push Docker Image
        run: |
          docker push 536342473074.dkr.ecr.us-east-1.amazonaws.com/frontend:latest